<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>تسجيل الدخول — سلامات</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    body{background:linear-gradient(135deg,#0F172A 0%,#1E3A8A 60%,#1D4ED8 100%);min-height:100vh;display:flex;flex-direction:column;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(37,99,235,.3) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(16,185,129,.15) 0%,transparent 50%);pointer-events:none;}
    .login-dots{position:fixed;inset:0;background-image:radial-gradient(rgba(255,255,255,.06) 1px,transparent 1px);background-size:36px 36px;pointer-events:none;}
    .login-wrapper{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;z-index:1;}
    .login-card{background:white;border-radius:24px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,.3);animation:fadeUp .6s ease both;}
    .login-logo{display:flex;align-items:center;gap:.6rem;margin-bottom:1.75rem;justify-content:center;}
    .login-logo-icon{width:44px;height:44px;background:var(--primary);border-radius:12px;display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:1.2rem;}
    .login-logo-text{font-size:1.4rem;font-weight:800;color:var(--dark);}
    .login-title{font-size:1.3rem;font-weight:800;color:var(--dark);text-align:center;margin-bottom:.25rem;}
    .login-subtitle{font-size:.88rem;color:var(--muted);text-align:center;margin-bottom:2rem;}
    .login-divider{display:flex;align-items:center;gap:.75rem;margin:1.25rem 0;color:var(--muted);font-size:.82rem;}
    .login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border);}
    .login-footer{text-align:center;font-size:.82rem;color:var(--muted);margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--border);}
    .login-footer a{color:var(--primary);text-decoration:none;font-weight:600;}
    .wa-btn{background:#25D366;color:white;width:100%;justify-content:center;margin-bottom:.75rem;font-size:.9rem;}
    .wa-btn:hover{background:#22C55E;}
    .forgot-link{font-size:.82rem;color:var(--primary);text-decoration:none;font-weight:600;}
    .forgot-link:hover{text-decoration:underline;}
    .form-row-end{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;}
    .remember-row{display:flex;align-items:center;gap:.4rem;font-size:.82rem;color:var(--muted);}
    input[type=checkbox]{accent-color:var(--primary);}
    .login-nav{position:relative;z-index:10;padding:1.25rem 2rem;display:flex;justify-content:center;}
    .back-home{display:flex;align-items:center;gap:.4rem;color:rgba(255,255,255,.7);text-decoration:none;font-size:.85rem;font-weight:600;transition:var(--transition);}
    .back-home:hover{color:white;}
  </style>
</head>
<body>
<div class="login-dots"></div>
<div class="login-nav"><a href="index.html" class="back-home">← العودة للرئيسية</a></div>
<div class="login-wrapper">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">س</div>
      <span class="login-logo-text">سلامات</span>
    </div>
    <h1 class="login-title">أهلاً بعودتك 👋</h1>
    <p class="login-subtitle">سجّل دخولك للوصول إلى لوحة التحكم</p>

    <a href="#" class="btn wa-btn">📱 الدخول عبر واتساب</a>

    <div class="login-divider">أو باستخدام البريد الإلكتروني</div>

    <div class="form-group">
      <label class="form-label">البريد الإلكتروني</label>
      <input type="email" class="form-control" placeholder="you@example.com"/>
    </div>
    <div class="form-group">
      <label class="form-label">كلمة المرور</label>
      <input type="password" class="form-control" placeholder="••••••••"/>
    </div>
    <div class="form-row-end">
      <label class="remember-row"><input type="checkbox"/> تذكرني</label>
      <a href="#" class="forgot-link">نسيت كلمة المرور؟</a>
    </div>
    <button class="btn btn-primary btn-lg" style="width:100%;justify-content:center">تسجيل الدخول</button>

    <div class="login-footer">
      ليس لديك حساب؟ <a href="packages.html">ابدأ مجاناً الآن</a>
    </div>
  </div>
</div>
</body>
</html>
